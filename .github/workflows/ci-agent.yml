name: CI with Build-Fixer Agent

on:
  push:
    branches: ["*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      build_failed: ${{ steps.test_step.outcome == 'failure' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pytest

      - id: test_step
        name: Run tests
        run: pytest tests/ --tb=short 2>&1 | tee build_log.txt
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt

  agent-fix:
    needs: test
    if: needs.test.outputs.build_failed == 'true'
    runs-on: ubuntu-latest
    environment: agent-proposed

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: build-log

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install openai PyGithub pytest

      - name: Run build-fixer agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
          BASE_BRANCH: ${{ github.ref_name }}
          MODEL: google/gemini-2.0-flash-exp:free
        run: python scripts/build_fixer_agent.py